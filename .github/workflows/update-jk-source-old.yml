name: Update jk_source_old

on:
  schedule:
    - cron: "17 5 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-jk-source-old:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip openpyxl

      - name: Update jk_source_old.csv
        run: python update_jk_source_old.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- jk_source_old.csv; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add jk_source_old.csv
          git commit -m "Automated update of jk_source_old.csv"
          git push
